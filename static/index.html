<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能数据分析 — Analytics Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── Variables ─────────────────────────────────────────────────────── */
:root {
  --obsidian:    #07090f;
  --surface-1:  #0d1118;
  --surface-2:  #131923;
  --surface-3:  #1a2232;
  --border-dim: #1e2a3a;
  --border-mid: #2a3a50;
  --border-lit: #374d68;
  --gold-deep:  #8a6820;
  --gold-mid:   #b8922e;
  --gold-bright:#d4aa4e;
  --gold-pale:  #e8cc80;
  --silver:     #6a7f98;
  --silver-lit: #8fa4be;
  --text-bright:#ede8e0;
  --text-mid:   #a8b4c4;
  --text-dim:   #586878;
  --text-dimmer:#384050;
  --crimson:    #c0392b;
  --crimson-bg: rgba(192,57,43,.12);
  --amber-bg:   rgba(184,146,46,.08);
}

/* ── Reset ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Body ───────────────────────────────────────────────────────────── */
body {
  font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--obsidian);
  color: var(--text-bright);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  /* Subtle dot-grid background */
  background-image: radial-gradient(circle, rgba(180,160,100,.07) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* ── Header ─────────────────────────────────────────────────────────── */
header {
  background: linear-gradient(180deg, rgba(13,17,24,.98) 0%, rgba(13,17,24,.92) 100%);
  border-bottom: 1px solid var(--border-dim);
  padding: 0 28px;
  flex-shrink: 0;
  position: relative;
  backdrop-filter: blur(12px);
}

/* gold rule at very top */
header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-mid) 20%, var(--gold-bright) 50%, var(--gold-mid) 80%, transparent);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
}

.logotype {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  width: 34px;
  height: 34px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.logo-primary {
  font-family: "Cormorant Garamond", serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--text-bright);
  line-height: 1;
}
.logo-sub {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.22em;
  color: var(--gold-mid);
  text-transform: uppercase;
  line-height: 1;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 20px;
}
.session-tag {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-dimmer);
  text-transform: uppercase;
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #2ecc71;
  box-shadow: 0 0 6px #2ecc71;
  animation: pulse-dot 2.8s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50%      { opacity: .4; }
}

/* Source chips row */
.header-bottom {
  height: 36px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid var(--border-dim);
}
.source-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--text-dimmer);
  text-transform: uppercase;
  white-space: nowrap;
  padding-right: 10px;
  border-right: 1px solid var(--border-dim);
}
#source-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chip {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 3px 10px;
  border: 1px solid var(--border-mid);
  color: var(--silver);
  background: transparent;
  cursor: default;
  transition: all .2s;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.chip:hover {
  border-color: var(--gold-deep);
  color: var(--gold-pale);
  background: var(--amber-bg);
}

/* ── Messages ───────────────────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 28px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}

/* Scrollbar */
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb {
  background: var(--border-mid);
  border-radius: 2px;
}

/* ── Empty State ────────────────────────────────────────────────────── */
.empty-state {
  margin: auto;
  text-align: center;
  padding: 40px 20px;
  animation: fade-up .6s ease both;
}
.empty-mark {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  opacity: .35;
}
.empty-headline {
  font-family: "Cormorant Garamond", serif;
  font-size: 22px;
  font-weight: 500;
  color: var(--text-mid);
  letter-spacing: .04em;
  margin-bottom: 10px;
}
.empty-sub {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-dim);
  line-height: 1.8;
  max-width: 340px;
  margin: 0 auto;
}

/* ── Message Rows ───────────────────────────────────────────────────── */
.msg-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  animation: fade-up .28s ease both;
}
.msg-row.user { justify-content: flex-end; }
.msg-row.ai   { justify-content: flex-start; }

@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Avatars */
.avatar {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.ai .avatar {
  background: linear-gradient(135deg, var(--gold-deep), var(--gold-mid));
  border: 1px solid var(--gold-bright);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}
.user .avatar {
  background: var(--surface-3);
  border: 1px solid var(--border-mid);
  border-radius: 2px;
  order: 1; /* appears after bubble for user */
}

/* Bubble wrappers */
.bubble-wrapper {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: min(620px, 82vw);
}

/* Bubbles */
.bubble {
  padding: 12px 16px;
  line-height: 1.7;
  font-size: 13.5px;
  font-weight: 300;
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
}
.ai .bubble {
  background: var(--surface-2);
  border: 1px solid var(--border-mid);
  border-radius: 0 8px 8px 8px;
  color: var(--text-bright);
}
.ai .bubble::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--gold-deep), transparent 60%);
}
.user .bubble {
  background: linear-gradient(135deg, var(--surface-3), var(--surface-2));
  border: 1px solid var(--border-lit);
  border-radius: 8px 0 8px 8px;
  color: var(--text-bright);
  text-align: right;
}
.user .bubble::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 40%, var(--gold-deep));
}

/* ── Loading Indicator ──────────────────────────────────────────────── */
.loading-indicator {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 11px;
  letter-spacing: .1em;
  color: var(--silver);
  padding: 10px 14px;
  background: var(--surface-1);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  border-left: 2px solid var(--gold-mid);
}
.pulse-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.pulse-dots span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold-mid);
  animation: dot-pulse 1.4s ease-in-out infinite;
}
.pulse-dots span:nth-child(2) { animation-delay: .2s; }
.pulse-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dot-pulse {
  0%,80%,100% { opacity: .2; transform: scale(.7); }
  40%          { opacity: 1;  transform: scale(1); }
}

/* ── Chart Container ────────────────────────────────────────────────── */
.chart-container {
  background: var(--surface-1);
  border: 1px solid var(--border-mid);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  /* 突破气泡宽度限制，贴近消息区两侧留边 */
  width: min(880px, calc(100vw - 80px));
}
.chart-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright) 50%, var(--gold-deep));
}
.chart-container svg {
  width: 100%;
  height: auto;
  display: block;
}
.chart-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  letter-spacing: .16em;
  color: var(--text-dimmer);
  text-transform: uppercase;
  padding: 6px 14px 4px;
  border-bottom: 1px solid var(--border-dim);
}

/* ── Clarification hint ─────────────────────────────────────────────── */
.clarify-hint {
  padding: 10px 14px;
  background: var(--amber-bg);
  border: 1px solid var(--gold-deep);
  border-radius: 4px;
  border-left: 2px solid var(--gold-bright);
  font-size: 13px;
  font-weight: 300;
  color: var(--gold-pale);
  line-height: 1.6;
}

/* ── Error Bubble ───────────────────────────────────────────────────── */
.error-bubble {
  padding: 10px 14px;
  background: var(--crimson-bg);
  border: 1px solid rgba(192,57,43,.3);
  border-left: 2px solid var(--crimson);
  border-radius: 4px;
  font-size: 12px;
  font-family: "IBM Plex Mono", monospace;
  color: #e07060;
}

/* ── Quick Prompts ──────────────────────────────────────────────────── */
#quick-prompts {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 28px 0;
  flex-shrink: 0;
}
.quick-btn {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .1em;
  padding: 5px 14px;
  border: 1px solid var(--border-mid);
  background: transparent;
  color: var(--silver);
  cursor: pointer;
  transition: all .2s ease;
  white-space: nowrap;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.quick-btn:hover:not(:disabled) {
  border-color: var(--gold-mid);
  color: var(--gold-pale);
  background: var(--amber-bg);
}
.quick-btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── Input Bar ──────────────────────────────────────────────────────── */
#input-bar {
  background: linear-gradient(0deg, rgba(7,9,15,.99) 0%, rgba(13,17,24,.95) 100%);
  border-top: 1px solid var(--border-mid);
  padding: 14px 28px 18px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  position: relative;
}
#input-bar::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-deep) 30%, var(--gold-deep) 70%, transparent);
  opacity: .5;
}

#user-input {
  flex: 1;
  resize: none;
  border: 1px solid var(--border-mid);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 13.5px;
  font-weight: 300;
  font-family: "IBM Plex Sans", "PingFang SC", sans-serif;
  background: var(--surface-2);
  color: var(--text-bright);
  line-height: 1.6;
  max-height: 120px;
  min-height: 44px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  caret-color: var(--gold-bright);
}
#user-input::placeholder { color: var(--text-dimmer); }
#user-input:focus {
  border-color: var(--gold-mid);
  box-shadow: 0 0 0 1px rgba(184,146,46,.15), 0 0 16px rgba(184,146,46,.06);
}
#user-input:disabled {
  background: var(--surface-1);
  color: var(--text-dim);
  border-color: var(--border-dim);
}

#send-btn {
  width: 44px;
  height: 44px;
  border: 1px solid var(--gold-mid);
  background: linear-gradient(135deg, var(--gold-deep), var(--gold-mid));
  color: var(--obsidian);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .2s ease;
  border-radius: 2px;
}
#send-btn:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--gold-mid), var(--gold-bright));
  box-shadow: 0 0 20px rgba(184,146,46,.35);
  transform: translateY(-1px);
}
#send-btn:disabled {
  opacity: .3;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
#send-btn svg { pointer-events: none; }

/* ── Reflect 计划块 ──────────────────────────────────────── */
.reflect-plan {
  border: 1px solid var(--border-mid);
  border-left: 2px solid var(--silver-lit);
  border-radius: 4px;
  background: var(--surface-1);
  font-size: 12px;
  margin-top: 8px;
}
.reflect-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  font-family: "IBM Plex Mono", monospace;
  letter-spacing: .1em;
  color: var(--silver);
  border-bottom: 1px solid var(--border-dim);
}
.reflect-body {
  padding: 10px 14px;
  color: var(--text-mid);
  white-space: pre-wrap;
  line-height: 1.6;
}
.reflect-toggle {
  margin-left: auto;
  font-size: 10px;
  background: none;
  border: 1px solid var(--border-mid);
  color: var(--text-dim);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 3px;
}
.reflect-toggle:hover {
  border-color: var(--border-lit);
  color: var(--text-mid);
}

.report-launch {
  display: block;
  text-decoration: none;
  border: 1px solid var(--border-mid);
  border-left: 2px solid var(--gold-bright);
  border-radius: 4px;
  padding: 12px 14px;
  background: linear-gradient(180deg, rgba(19,25,35,.96) 0%, rgba(13,17,24,.98) 100%);
  color: var(--text-bright);
}
.report-launch:hover {
  border-color: var(--gold-mid);
  box-shadow: 0 0 0 1px rgba(184,146,46,.14);
}
.report-launch-kicker {
  display: block;
  font-family: "IBM Plex Mono", monospace;
  font-size: 9px;
  letter-spacing: .16em;
  color: var(--gold-mid);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.report-launch-title {
  display: block;
  font-family: "Cormorant Garamond", serif;
  font-size: 24px;
  line-height: 1.05;
  color: var(--text-bright);
}
.report-launch-copy {
  display: block;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-mid);
  margin-top: 8px;
}

body.report-mode {
  overflow: auto;
}
body.report-mode .chat-only {
  display: none !important;
}
body.report-mode header {
  position: sticky;
  top: 0;
  z-index: 10;
}
#report-shell {
  display: none;
  min-height: calc(100dvh - 94px);
  padding: 28px;
}
body.report-mode #report-shell {
  display: block;
}
.report-frame {
  max-width: 1180px;
  margin: 0 auto 40px;
}
.report-hero {
  display: grid;
  grid-template-columns: 1.2fr .8fr;
  gap: 18px;
  margin-bottom: 18px;
}
.report-panel {
  background:
    linear-gradient(180deg, rgba(19,25,35,.98) 0%, rgba(13,17,24,.98) 100%);
  border: 1px solid var(--border-mid);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}
.report-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,170,78,.85), transparent);
}
.report-hero-main {
  padding: 26px 26px 22px;
}
.report-kicker {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--gold-mid);
  text-transform: uppercase;
}
.report-title {
  margin-top: 10px;
  font-family: "Cormorant Garamond", serif;
  font-size: clamp(36px, 5vw, 56px);
  line-height: .95;
  color: var(--text-bright);
}
.report-subtitle {
  margin-top: 14px;
  max-width: 58ch;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-mid);
}
.report-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 18px;
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.report-actions {
  padding: 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.report-nav {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--silver-lit);
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
}
.report-nav:hover {
  color: var(--gold-pale);
}
.report-risk-banner {
  margin-top: 20px;
  padding: 16px;
  border: 1px solid var(--border-dim);
  background: rgba(138,104,32,.08);
}
.report-risk-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .16em;
  color: var(--gold-mid);
  text-transform: uppercase;
}
.report-risk-copy {
  margin-top: 8px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-mid);
}
.report-section {
  margin-top: 18px;
  padding: 18px;
}
.report-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 18px;
}
.report-kpis {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.report-kpi {
  padding: 16px;
  border: 1px solid var(--border-dim);
  background: rgba(255,250,241,.02);
  min-height: 128px;
}
.report-kpi-label {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--silver);
}
.report-kpi-value {
  margin-top: 12px;
  font-family: "Cormorant Garamond", serif;
  font-size: 38px;
  line-height: .95;
  color: var(--text-bright);
}
.report-kpi-note {
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-dim);
}
.report-section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.report-section-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 30px;
  color: var(--text-bright);
}
.report-section-note {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.report-summary-list,
.report-actions-list,
.report-focus-list,
.report-module-list {
  display: grid;
  gap: 12px;
}
.report-summary-item,
.report-action-item,
.report-focus-item,
.report-module-item {
  border: 1px solid var(--border-dim);
  padding: 14px 16px;
  background: rgba(255,250,241,.02);
}
.report-focus-eyebrow,
.report-module-name {
  font-family: "IBM Plex Mono", monospace;
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--gold-mid);
}
.report-focus-title {
  margin-top: 8px;
  font-size: 18px;
  color: var(--text-bright);
}
.report-focus-copy,
.report-module-copy,
.report-action-copy {
  margin-top: 8px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-mid);
}
.report-chart-shell {
  overflow: hidden;
  border: 1px solid var(--border-dim);
  background: rgba(255,250,241,.02);
}
.report-chart-shell svg {
  width: 100%;
  height: auto;
  display: block;
}
.report-loading,
.report-error {
  max-width: 960px;
  margin: 80px auto;
  padding: 20px 24px;
  border: 1px solid var(--border-mid);

}
.report-error {

}
@media (max-width: 960px) {

    padding: 18px;
  }
  .report-hero,
  .report-kpis,
  .report-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<script>
// ── SVG Icons ──────────────────────────────────────────────────────────────
const ICON_AI = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="7.5,1 13,4.25 13,10.75 7.5,14 2,10.75 2,4.25" fill="none" stroke="rgba(7,9,15,.9)" stroke-width="1"/>
  <polyline points="4,10 6.5,6.5 8.5,8.5 11,4" fill="none" stroke="rgba(7,9,15,.9)" stroke-width="1.4"/>
</svg>`;

const ICON_USER = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="7" cy="4.5" r="2.5" stroke="#6a7f98" stroke-width="1.2"/>
  <path d="M1 13c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#6a7f98" stroke-width="1.2" stroke-linecap="round"/>
</svg>`;

// ── Session 管理 ──────────────────────────────────────────────────────────
const isReportMode = window.location.pathname.startsWith('/report/');
const reportId = isReportMode ? window.location.pathname.split('/').filter(Boolean).pop() : null;
const sessionId = localStorage.getItem('sdq_session_id') || (() => {
  const id = crypto.randomUUID();
  localStorage.setItem('sdq_session_id', id);
  return id;
})();

// 显示 session 缩略
document.getElementById('session-display').textContent =
  'SESSION — ' + sessionId.slice(0, 8).toUpperCase();

// ── 加载数据源 chips ───────────────────────────────────────────────────────
async function loadDataSources() {
  try {
    const res = await fetch('/api/data-sources');
    const data = await res.json();
    const chipsEl = document.getElementById('source-chips');
    chipsEl.innerHTML = '';
    for (const [name, info] of Object.entries(data)) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = info.description;
      chip.title = name;
      chipsEl.appendChild(chip);
    }
  } catch (e) {
    console.warn('数据源加载失败', e);
  }
}
if (!isReportMode) {
  loadDataSources();
}

// ── UI 工具函数 ────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
let emptyStateEl = document.getElementById('empty-state');
const userInput  = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const reportShell = document.getElementById('report-shell');

function hideEmptyState() {
  if (emptyStateEl) { emptyStateEl.remove(); emptyStateEl = null; }
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setInputEnabled(enabled) {
  userInput.disabled = !enabled;
  sendBtn.disabled   = !enabled;
  document.querySelectorAll('.quick-btn').forEach(b => b.disabled = !enabled);
}

/* append a user message row */
function appendUserBubble(text) {
  hideEmptyState();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="bubble-wrapper">
      <div class="bubble">${escapeHtml(text)}</div>
    </div>
    <div class="avatar">${ICON_USER}</div>
  `;
  messagesEl.appendChild(row);
  scrollToBottom();
}

/* create AI row, return handles for streaming fill */
function createAiBubble() {
  hideEmptyState();
  const row = document.createElement('div');
  row.className = 'msg-row ai';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = ICON_AI;

  const wrapper = document.createElement('div');
  wrapper.className = 'bubble-wrapper';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  wrapper.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(wrapper);
  messagesEl.appendChild(row);
  scrollToBottom();

  return {
    bubble,
    appendExtra: (el) => { wrapper.appendChild(el); scrollToBottom(); },
  };
}

function createLoadingIndicator(text = '正在查询数据') {
  const el = document.createElement('div');
  el.className = 'loading-indicator';
  el.innerHTML = `
    <div class="pulse-dots"><span></span><span></span><span></span></div>
    <span>${text}</span>
  `;
  return el;
}

function createReportLaunchCard(reportUrl) {
  const link = document.createElement('a');
  link.className = 'report-launch';
  link.href = reportUrl;
  link.innerHTML = `
    <span class="report-launch-kicker">Management Brief Ready</span>
    <span class="report-launch-title">打开管理层简报</span>
    <span class="report-launch-copy">切换到独立报表页查看核心指标、重点车场、风险摘要和优先动作。</span>
  `;
  return link;
}

function formatWindowLabel(preset) {
  const map = {
    last_7_days: '最近 7 天',
    last_30_days: '最近 30 天',
    this_week: '本周',
    last_week: '上周',
    this_month: '本月',
    last_month: '上月',
    this_year: '今年',
  };
  return map[preset] || preset || '当前周期';
}

function formatMoney(value) {
  return '¥' + Number(value || 0).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function formatCount(value) {
  return Number(value || 0).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function formatPercent(value) {
  return `${(Number(value || 0) * 100).toFixed(1)}%`;
}

function renderReportPage(payload) {

          </article>
          <article class="report-kpi">

            <div class="report-kpi-note">反映整体车流强度。</div>
          </article>
          <article class="report-kpi">
            <div class="report-kpi-label">平均利用率</div>
            <div class="report-kpi-value">${escapeHtml(formatPercent(overview.avg_occupancy_rate))}</div>

          </article>
          <article class="report-kpi">

          </article>
        </div>
      </section>

      <section class="report-grid">
        <article class="report-panel report-section" style="grid-column: span 5;">

          <div class="report-summary-list">
            ${(payload.executive_summary || []).map(item => `
              <div class="report-summary-item">${escapeHtml(item)}</div>

          </div>
        </article>

        <article class="report-panel report-section" style="grid-column: span 7;">
          <div class="report-section-head">
            <h2 class="report-section-title">重点车场</h2>

          </div>
          <div class="report-focus-list">
            ${(payload.focus_lots || []).map(item => `
              <div class="report-focus-item">
                <div class="report-focus-eyebrow">${escapeHtml(item.topic || '重点事项')}</div>
                <div class="report-focus-title">${escapeHtml(item.parking_lot || '重点车场')}</div>
                <div class="report-focus-copy">${escapeHtml(item.summary || '')}</div>
              </div>

          </div>
        </article>

        <article class="report-panel report-section" style="grid-column: span 6;">
          <div class="report-section-head">
            <h2 class="report-section-title">优先动作</h2>
            <span class="report-section-note">Immediate Actions</span>
          </div>
          <div class="report-actions-list">
            ${(payload.priority_actions || []).map(item => `
              <div class="report-action-item">
                <div class="report-action-copy">${escapeHtml(item)}</div>
              </div>
            `).join('')}
          </div>
        </article>

        <article class="report-panel report-section" style="grid-column: span 6;">
          <div class="report-section-head">
            <h2 class="report-section-title">模块摘要</h2>
            <span class="report-section-note">Signals</span>
          </div>
          <div class="report-module-list">
            ${Object.entries(payload.modules || {}).map(([name, items]) => `
              <div class="report-module-item">
                <div class="report-module-name">${escapeHtml(name)}</div>
                <div class="report-module-copy">${escapeHtml((items || []).join(' '))}</div>

      <section class="report-panel report-section" style="margin-top:18px;">

  `;
}

async function bootReportPage() {
  document.getElementById('session-display').textContent = 'REPORT — ' + reportId.toUpperCase().slice(0, 8);
  reportShell.innerHTML = '<div class="report-loading">正在加载管理层简报…</div>';
  try {
    const response = await fetch(`/api/report/${reportId}`);
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    const payload = await response.json();
    renderReportPage(payload);
  } catch (error) {
    reportShell.innerHTML = `<div class="report-error">报表加载失败：${escapeHtml(error.message)}</div>`;
  }
}

// ── SSE 聊天核心 ───────────────────────────────────────────────────────────
let isProcessing = false;

async function sendMessage(text) {
  text = text.trim();
  if (!text || isProcessing) return;

  isProcessing = true;
  setInputEnabled(false);

  appendUserBubble(text);

  const { bubble, appendExtra } = createAiBubble();
  let loadingEl = null;
  // 每次更新 loadingEl 时先把旧节点从 DOM 移除，防止多轮 tool_use 时残留
  const setLoadingEl = (el) => { if (loadingEl) loadingEl.remove(); loadingEl = el; };

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text }),
    });

    if (!response.ok) {
      bubble.innerHTML = `<div class="error-bubble">请求失败：HTTP ${response.status}</div>`;
      return;
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }
        handleSseEvent(event, bubble, appendExtra, setLoadingEl);
      }
    }
  } catch (err) {
    const errEl = document.createElement('div');
    errEl.className = 'error-bubble';
    errEl.textContent = `连接错误：${err.message}`;
    appendExtra(errEl);
  } finally {
    if (loadingEl) loadingEl.remove();
    isProcessing = false;
    setInputEnabled(true);
    userInput.focus();
    scrollToBottom();
  }
}

function handleSseEvent(event, bubble, appendExtra, setLoadingEl) {
  switch (event.type) {
    case 'text_delta':
      bubble.textContent += event.content;
      scrollToBottom();
      break;

    case 'tool_use': {
      const labelMap = {
        'list_data_sources': 'QUERYING DATA SOURCES',
        'reflect': 'PLANNING ANALYSIS',
        'compare_periods': 'COMPARING PERIODS',
        'save_insight': 'SAVING INSIGHT',
      };
      const label = labelMap[event.tool_name] || 'EXECUTING ANALYSIS';
      const el = createLoadingIndicator(label);
      appendExtra(el);
      setLoadingEl(el);
      break;
    }

    case 'reflect': {
      setLoadingEl(null);
      const planEl = document.createElement('div');
      planEl.className = 'reflect-plan';
      planEl.innerHTML = `
        <div class="reflect-header">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M6 3.5v3l2 1.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span>分析计划</span>
          <button class="reflect-toggle">收起</button>
        </div>
        <div class="reflect-body">${escapeHtml(event.plan || '')}</div>
      `;
      planEl.querySelector('.reflect-toggle').onclick = function() {
        const body = planEl.querySelector('.reflect-body');
        const collapsed = body.style.display === 'none';
        body.style.display = collapsed ? '' : 'none';
        this.textContent = collapsed ? '收起' : '展开';
      };
      appendExtra(planEl);
      scrollToBottom();
      break;
    }

    case 'tool_result': {
      setLoadingEl(null);

      if (event.chart_svg) {
        const wrap = document.createElement('div');
        wrap.className = 'chart-container';
        wrap.innerHTML = `<div class="chart-label">Analysis Result · Chart</div>${event.chart_svg}`;
        appendExtra(wrap);
      }

      if (event.needs_clarification && event.clarifying_question) {
        const hint = document.createElement('div');
        hint.className = 'clarify-hint';
        hint.textContent = event.clarifying_question;
        appendExtra(hint);
      }

      if (event.error) {
        const errEl = document.createElement('div');
        errEl.className = 'error-bubble';
        errEl.textContent = `QUERY ERROR — ${event.error}`;
        appendExtra(errEl);
      }

      if (event.report_url) {
        appendExtra(createReportLaunchCard(event.report_url));
      }
      break;
    }

    case 'error': {
      const errEl = document.createElement('div');
      errEl.className = 'error-bubble';
      errEl.textContent = `SYSTEM ERROR — ${event.message}`;
      appendExtra(errEl);
      break;
    }

    case 'done': break;
  }
}

// ── 输入框事件 ─────────────────────────────────────────────────────────────
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const v = userInput.value;
    userInput.value = '';
    userInput.style.height = 'auto';
    sendMessage(v);
  }
});

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', () => {
  const v = userInput.value;
  userInput.value = '';
  userInput.style.height = 'auto';
  sendMessage(v);
});

function sendQuick(text) {
  if (isProcessing) return;
  sendMessage(text);
}

if (isReportMode && reportId) {
  bootReportPage();
}
</script>
</body>
